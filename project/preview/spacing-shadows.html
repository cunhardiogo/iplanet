<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:#f5f5f7">
  <div class="row" style="gap: 18px; align-items:flex-end">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px">
      <div style="width:120px; height:80px; background:#fff; border-radius:14px; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.06)"></div>
      <div class="token">card — default</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px">
      <div style="width:120px; height:80px; background:#fff; border-radius:14px; box-shadow: 0 2px 6px rgba(0,0,0,0.06), 0 14px 32px rgba(0,0,0,0.10); transform: translateY(-2px)"></div>
      <div class="token">card — hover (lift 2px)</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px">
      <div style="width:120px; height:80px; background:rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-radius:14px; border-bottom: 1px solid rgba(0,0,0,0.06)"></div>
      <div class="token">nav — blurred white</div>
    </div>
  </div>
  <div class="label" style="margin-top:14px; color:#6e6e73">Shadows are nearly invisible — the white-on-grey field provides the boundary.</div>
</body></html>
