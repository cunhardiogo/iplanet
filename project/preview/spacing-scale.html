<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row" style="align-items:flex-end; gap: 8px">

    <div style="display:flex; flex-direction:column; align-items:center; gap:4px"><div style="width:8px; height:30px; background:#1d1d1f"></div><div class="token">8</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px"><div style="width:12px; height:30px; background:#1d1d1f"></div><div class="token">12</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px"><div style="width:16px; height:30px; background:#1d1d1f"></div><div class="token">16</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px"><div style="width:24px; height:30px; background:#1d1d1f"></div><div class="token">24</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:4px"><div style="width:32px; height:30px; background:#1d1d1f"></div><div class="token">32</div></div>

  <div class="label" style="margin-top:14px">Spacing scale: 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 88 / 128. Section gaps use 88–128.</div>
</body></html>
