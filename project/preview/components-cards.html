<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:#f5f5f7">
  <div class="row" style="gap: 12px;">
    <div style="background:#fff; border-radius:18px; padding:18px; width: 200px; box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.06)">
      <div style="font-size:12px; font-weight:600; color:#f56300; text-transform: uppercase; letter-spacing: 0.06em">NOVO</div>
      <div style="font-family:var(--ip-font-display); font-size:20px; font-weight:600; line-height:1.2; margin-top:4px">MacBook Neo</div>
      <div style="font-size:13px; color:#6e6e73; margin-top:6px; line-height:1.4">A magia do Mac é uma escolha inteligente.</div>
      <div style="font-size:13px; color:#6e6e73; margin-top:4px">A partir de R$ 7.299</div>
      <div style="height:60px; margin-top:12px; background: linear-gradient(180deg,#fff,#f5f5f7); border-radius:8px"></div>
    </div>
    <div style="background:#000; color:#fff; border-radius:18px; padding:18px; width: 200px">
      <div style="font-family:var(--ip-font-display); font-size:20px; font-weight:600; line-height:1.2">iPhone 17 Pro</div>
      <div style="font-size:13px; color:#a1a1a6; margin-top:6px">Pro em tudo. A partir de R$ 11.499</div>
      <div style="height:80px; margin-top:14px; background: radial-gradient(ellipse at center, #f56300 0%, #000 70%); border-radius:8px"></div>
    </div>
  </div>
  <div class="label" style="margin-top:14px">White product card · Dark hero card</div>
</body></html>
